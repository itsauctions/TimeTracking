name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            os: macos-latest
            build_command: npm run package:mac -- --publish never
            release_glob: dist/*.dmg
          - name: Windows Portable
            os: windows-latest
            build_command: npm run package:win -- --publish never
            release_glob: dist/*.exe

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Skip electron-builder's keychain signing. macOS still gets an ad-hoc
      # signature from scripts/after-pack.js so Gatekeeper does not call the
      # download "damaged". Users may still need right-click → Open once.
      - name: Build release artifacts
        run: ${{ matrix.build_command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify macOS native module architectures
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          apps=(dist/mac/Workday\ Time\ Tracker.app dist/mac-arm64/Workday\ Time\ Tracker.app dist/mac-x64/Workday\ Time\ Tracker.app)
          found=0
          for app in "${apps[@]}"; do
            [ -d "$app" ] || continue
            found=1
            node_path="$app/Contents/Resources/app.asar.unpacked/node_modules/better-sqlite3/build/Release/better_sqlite3.node"
            electron_bin="$app/Contents/MacOS/Workday Time Tracker"
            echo "Checking $app"
            file "$electron_bin"
            file "$node_path"
            electron_arch="$(lipo -archs "$electron_bin")"
            node_arch="$(lipo -archs "$node_path")"
            echo "electron=$electron_arch sqlite=$node_arch"
            for arch in $electron_arch; do
              echo "$node_arch" | grep -qw "$arch"
            done
          done
          if [ "$found" -eq 0 ]; then
            echo "No macOS app bundles found under dist/"
            exit 1
          fi

      - name: Generate checksums
        shell: bash
        run: |
          node -e 'const fs = require("fs"); const crypto = require("crypto");
          const files = fs.readdirSync("dist").filter((file) => /\.(dmg|exe)$/.test(file));
          if (!files.length) throw new Error("No release artifacts found");
          const lines = files.map((file) => {
            const hash = crypto.createHash("sha256").update(fs.readFileSync("dist/" + file)).digest("hex");
            return hash + "  " + file;
          });
          fs.writeFileSync("dist/SHA256SUMS-" + process.env.RUNNER_OS + ".txt", lines.join("\n") + "\n");'

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ matrix.release_glob }}
            dist/SHA256SUMS-*.txt
          body: |
            Desktop build without Apple/Microsoft developer certificates.

            ### macOS downloads
            - Apple Silicon (M1/M2/M3/M4): `Workday-Time-Tracker-*-mac-arm64.dmg`
            - Intel Macs: `Workday-Time-Tracker-*-mac-x64.dmg`

            ### macOS first open
            The app is ad-hoc signed (not Apple-notarized). Gatekeeper may show **“Workday Time Tracker” Not Opened** / *Apple could not verify…* with only **Move to Trash** and **Done**. That is normal, not a corrupt download.

            1. Click **Done** (do not move it to Trash).
            2. Open **System Settings → Privacy & Security**.
            3. Scroll to the Workday Time Tracker message and click **Open Anyway**.
            4. Confirm again if macOS asks.

            Optional Terminal workaround after install:
            `xattr -cr "/Applications/Workday Time Tracker.app"`

            ### Windows
            SmartScreen may warn because the app is unsigned.
