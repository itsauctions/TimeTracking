name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS DMG
            os: macos-latest
            build_command: npm run package:mac -- --publish never
            release_glob: dist/*.dmg
          - name: Windows Portable
            os: windows-latest
            build_command: npm run package:win -- --publish never
            release_glob: dist/*.exe

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned artifacts
        run: ${{ matrix.build_command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Generate checksums
        shell: bash
        run: |
          node -e 'const fs = require("fs"); const crypto = require("crypto");
          const files = fs.readdirSync("dist").filter((file) => /\.(dmg|exe)$/.test(file));
          if (!files.length) throw new Error("No release artifacts found");
          const lines = files.map((file) => {
            const hash = crypto.createHash("sha256").update(fs.readFileSync("dist/" + file)).digest("hex");
            return hash + "  " + file;
          });
          fs.writeFileSync("dist/SHA256SUMS-" + process.env.RUNNER_OS + ".txt", lines.join("\n") + "\n");'

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ matrix.release_glob }}
            dist/SHA256SUMS-*.txt
          body: |
            Unsigned desktop build.

            macOS: if Gatekeeper blocks the app, right-click the app and choose Open, or approve it in Privacy & Security.
            Windows: SmartScreen may warn because the app is unsigned.
